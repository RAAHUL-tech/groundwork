version: '3.9'

services:
  api:
    build: ./api
    container_name: groundwork_api
    ports:
      - "5001:5001"
    volumes:
      - ./api:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - PYTHONPATH=/app
    command: flask run --host=0.0.0.0 --port=5001 --debug
    restart: unless-stopped

  worker:
    build: ./api
    container_name: groundwork_worker
    volumes:
      - ./api:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
    command: celery -A celery_worker worker --loglevel=info --concurrency=4
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: groundwork_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
